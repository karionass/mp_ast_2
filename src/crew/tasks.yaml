tasks:
  - agent: Transcriber
    prompt: |
      У тебя есть текст лекции: {transcript}.
      Разбей его на логические блоки и выдели ключевые термины.
      Верни результат в виде JSON:
      [
        {"block": 1, "text": "...", "keywords": ["...", "..."]},
        {"block": 2, "text": "...", "keywords": ["...", "..."]}
      ]

  - agent: Localizer
    prompt: |
      У тебя есть JSON с блоками текста лекции: {blocks}
      У тебя есть глоссарий: {glossary}
      Переведи каждый блок на русский язык, используя термины из глоссария.
      Верни переведённый текст в формате:
      [
        {"block": 1, "translated_text": "..."},
        {"block": 2, "translated_text": "..."}
      ]